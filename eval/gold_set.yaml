  - id: adv-03
    kind: projects
    tags: [adversarial]
    pair: sys-003
    query: "what is a SYS-003 observation"
    expected_sources:
      - kb/projects/kb-agent.md

  - id: adv-04
    kind: projects
    tags: [adversarial]
    pair: sys-003
    query: "what shape do the agent's tool results take, and how does it recover when a tool fails"
    expected_sources:
      - kb/projects/kb-agent.md
