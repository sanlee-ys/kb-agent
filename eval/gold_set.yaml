    expected_sources:
      - learning-notes/27-fan-out-cost-control.md

  # ---- adversarial (4 = 2 jargon-vs-paraphrase pairs) ----------------------
  # Same expected source within a pair; the two phrasings should pull lexical
  # and dense retrieval in different directions. These carry the later
  # hybrid-retrieval decision.
  - id: adv-01
    kind: notes
    tags: [adversarial]
    pair: rag
    query: "what is RAG"
    expected_sources:
      - learning-notes/06-rag-answering-from-your-own-docs.md

  - id: adv-02
    kind: notes
    tags: [adversarial]
    pair: rag
    query: "how can a model answer questions using my own documents instead of its training data"
    expected_sources:
