name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      # Plain `uv sync` installs the default `dev` dependency group, so ruff
      # and pytest land in the venv without any extra flags.
      - name: Install dependencies
        run: uv sync --python 3.11

      # The integration test (tests/test_kb_roundtrip.py) builds a real ChromaDB,
      # which downloads the ~80MB all-MiniLM-L6-v2 ONNX model on first use. Cache
      # ChromaDB's model dir (and the HF cache as a fallback) so it's fetched once
      # and restored on later runs instead of re-downloaded on every CI run.
      - name: Cache embedding model
        uses: actions/cache@v6
        with:
          path: |
            ~/.cache/chroma
            ~/.cache/huggingface
          key: embedding-model-all-MiniLM-L6-v2-v1

      - name: Lint
        run: uv run ruff check .

      # The consumer half of the SYS-004 guard, and the only check in this repo
      # that looks OUTWARD. Every other test asserts this code against fixtures
      # this repo controls, which is why the provider adding `region` went
      # undetected here for a full day while CI stayed green. Fetches the
      # provider's published contract and fails on divergence. A fetch failure
      # (GitHub outage) warns and passes; a successful fetch showing drift fails.
      - name: Contract matches the provider (SYS-004)
        run: uv run python scripts/check_classify_contract.py

      # The same guard for the second seam this repo consumes: notes-api's
      # GET /notes (SYS-006). That contract is OPEN — an added provider field is
      # backward-compatible — so this fails only when a field search_notes
      # actually reads disappears, which otherwise degrades silently to None.
      - name: Notes read contract matches the provider (SYS-006)
        run: uv run python scripts/check_notes_contract.py

      # The architecture repo has enforced 'Downstream surfaces' on SYS-NNN docs
      # since 2026-07-18; repo-local ADR tiers had no check at all. That gap is how
      # a classifier ADR shipped without one and the follow-up sweep missed a file.
      # All 7 ADRs here already comply, so this is enforced with zero exceptions.
      - name: ADRs list their downstream surfaces
        run: uv run python scripts/lint_decisions.py

      - name: Test
        run: uv run pytest
