name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python 3.11
        run: uv python install 3.11

      # Install the project plus the `dev` optional-dependency extra, so that
      # ruff and pytest are present in the venv (plain `uv sync` omits extras).
      - name: Install dependencies
        run: uv sync --extra dev --python 3.11

      - name: Lint
        run: uv run ruff check .

      - name: Test
        run: uv run pytest
