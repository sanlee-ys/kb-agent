projects:
  - name: defense-news-classifier
    path: C:\Users\sanle\code\defense-news-classifier
    description: LLM classifier for public defense-news snippets — assigns category, operational domain, and region via structured tool-use output, scored against a human-labeled eval that gates CI
    # Optional: if a project runs an HTTP service, list its base URL here. That
    # makes the project *callable* by the agent (see classify_snippet in tools.py),
    # not just searchable. Start this one with, from the classifier's directory:
    #   uv run --env-file .env uvicorn api:app --app-dir src --host 127.0.0.1 --port 8000
    endpoint: http://127.0.0.1:8000
  - name: notes-api
    path: C:\Users\sanle\code\notes-api
    description: Python/FastAPI notes REST API (CRUD, tags, search; async tag enrichment via BackgroundTasks)
    # The agent reads notes from this service over HTTP (see search_notes in
    # tools.py). Start it with, from the notes-api directory:
    #   uvicorn notes_api.main:app --port 8081   (serves on http://localhost:8081)
    endpoint: http://localhost:8081

# Extra directories of hand-written Markdown notes to index alongside the
# generated KB. These live outside this repo (and outside git) on purpose;
# index.py reads them at index time and tags their chunks with kind: "notes".
notes_dirs:
  - C:\Users\sanle\code\learning-notes
